spring.application.name=eramix
server.port=${BACKEND_PORT:8080}

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:eramix}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:eramix_user}
spring.datasource.password=${DB_PASSWORD:eramix_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration,classpath:com/eramix/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false

app.jwt.secret=${JWT_SECRET:defaultSecretKeyForDevelopmentOnlyDoNotUseInProduction256bit!!}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:2592000000}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:19006,http://localhost:8081,http://172.20.10.4:8081,exp://172.20.10.4:8081}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Redis Cache (Phase 29) ────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.type=redis
spring.cache.redis.time-to-live=600000

# ── Anthropic AI (Phase 21) ──────────────────────────────────────────
app.ai.anthropic.api-key=${ANTHROPIC_API_KEY:}
app.ai.anthropic.model=${ANTHROPIC_MODEL:claude-sonnet-4-20250514}

# ── Stripe (Phase 26-27) ─────────────────────────────────────────────
app.stripe.secret-key=${STRIPE_SECRET_KEY:}
app.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}

# ── Actuator / Prometheus (Phase 32) ─────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=when-authorized
management.metrics.tags.application=${spring.application.name}
