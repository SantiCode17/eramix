spring.application.name=eramix
server.port=${BACKEND_PORT:8080}

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:eramix}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:eramix_user}
spring.datasource.password=${DB_PASSWORD:eramix_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET:defaultSecretKeyForDevelopmentOnlyDoNotUseInProduction256bit!!}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:19006,http://localhost:8081}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
