services:
  db:
    image: mysql:8
    container_name: eramix-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-eramix}
      MYSQL_USER: ${DB_USERNAME:-eramix_user}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - eramix-db-data:/var/lib/mysql
    networks:
      - eramix-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eramix-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-eramix}
      DB_USERNAME: ${DB_USERNAME:-eramix_user}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS:-604800000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:19006,http://localhost:8081}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - eramix-network

volumes:
  eramix-db-data:

networks:
  eramix-network:
    driver: bridge
