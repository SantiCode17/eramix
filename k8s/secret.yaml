apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: eramix
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: eramix
type: Opaque
stringData:
  # ── Reemplazar con valores reales antes de deploy ──
  SPRING_DATASOURCE_URL: "jdbc:mysql://mysql-service:3306/eramix?useSSL=true&requireSSL=true"
  SPRING_DATASOURCE_USERNAME: "eramix_app"
  SPRING_DATASOURCE_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  JWT_SECRET: "CHANGE_ME_GENERATE_256BIT_KEY"
  ANTHROPIC_API_KEY: "sk-ant-CHANGE_ME"
  STRIPE_SECRET_KEY: "sk_live_CHANGE_ME"
  SPRING_DATA_REDIS_HOST: "redis-service"
  SPRING_DATA_REDIS_PORT: "6379"
  SPRING_DATA_REDIS_PASSWORD: "CHANGE_ME_REDIS_PASSWORD"
